<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mockup A, mobile</title>
<style>
  *{box-sizing:border-box;margin:0}
  body{background:#e9e7e1;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px}
  h2{font-size:15px;color:#3c4858;font-weight:600;margin-bottom:4px}
  p{font-size:12.5px;color:#6b7280;margin-bottom:20px;text-align:center}
  .phone{width:412px;max-width:100%;height:880px;background:#0a2540;border-radius:46px;padding:12px;box-shadow:0 30px 80px rgba(10,37,64,.35)}
  .screen{width:100%;height:100%;background:#f6f5f1;border-radius:36px;overflow:hidden;position:relative}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:140px;height:26px;background:#0a2540;border-radius:0 0 16px 16px;z-index:2}
  iframe{width:100%;height:100%;border:0}
</style></head>
<body>
  <h2>Mockup A — mobile preview</h2>
  <p>This is the same page rendered at phone width. Scroll inside the phone.</p>
  <div class="phone"><div class="screen"><div class="notch"></div><iframe src="/mock-a.html"></iframe></div></div>
</body></html>
